<style>
:root{
  --green:#4CAF50;--green-light:#7BC67E;--green-dark:#2E7D32;
  --gold:#F5B800;--dark:#0D1A0D;--dark2:#122012;--dark3:#1A2E1A;
  --surface:#1E2E1E;--text:#F0F5F0;--text-muted:#8FAD8F;
  --border:rgba(76,175,80,0.2);
  --glow:0 0 40px rgba(76,175,80,0.25);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--text);overflow-x:hidden;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:var(--dark);}
::-webkit-scrollbar-thumb{background:var(--green);border-radius:3px;}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:1000;padding:12px 40px;display:flex;align-items:center;justify-content:space-between;transition:all 0.4s;}
nav.scrolled{background:rgba(10,20,10,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
.nav-logo{display:flex;align-items:center;gap:10px;cursor:pointer;text-decoration:none;}
.nav-logo img{height:44px;object-fit:contain;filter:drop-shadow(0 0 2px rgba(76,175,80,0.3));}
.nav-logo-text{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--green-light);line-height:1;}
.nav-logo-tagline{font-size:9px;color:var(--text-muted);letter-spacing:0.5px;}
.nav-links{display:flex;align-items:center;gap:4px;}
.nav-links a{color:var(--text-muted);text-decoration:none;font-size:13px;font-weight:500;padding:7px 13px;border-radius:50px;transition:all 0.3s;cursor:pointer;}
.nav-links a:hover,.nav-links a.active{color:var(--text);background:rgba(76,175,80,0.15);}
.nav-cta{background:linear-gradient(135deg,var(--green-dark),var(--green))!important;color:#fff!important;font-weight:600!important;}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:8px;background:none;border:none;}
.hamburger span{width:24px;height:2px;background:var(--text);border-radius:2px;display:block;transition:all 0.3s;}
.mobile-menu{display:none;position:fixed;top:72px;left:0;right:0;background:rgba(10,20,10,0.98);backdrop-filter:blur(20px);padding:16px;flex-direction:column;gap:2px;z-index:999;border-bottom:1px solid var(--border);}
.mobile-menu.open{display:flex;}
.mobile-menu a{color:var(--text-muted);text-decoration:none;font-size:15px;padding:12px 16px;border-radius:10px;transition:all 0.3s;cursor:pointer;}
.mobile-menu a:hover{color:var(--text);background:rgba(76,175,80,0.15);}

/* PAGE SYSTEM */
.page{display:none;animation:fadeIn 0.4s ease;}
.page.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}

/* SECTION BASICS */
section{padding:90px 0;}
.container{max-width:1200px;margin:0 auto;padding:0 40px;}
.section-tag{display:inline-flex;align-items:center;gap:8px;background:rgba(76,175,80,0.1);border:1px solid rgba(76,175,80,0.25);border-radius:50px;padding:6px 18px;font-size:12px;color:var(--green-light);font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;}
.section-title{font-family:'Syne',sans-serif;font-size:clamp(28px,4vw,46px);font-weight:800;line-height:1.15;margin-bottom:16px;}
.section-sub{font-size:16px;color:var(--text-muted);max-width:600px;line-height:1.7;}
.text-center{text-align:center;}
.text-center .section-sub{margin:0 auto;}
.gradient-text{background:linear-gradient(135deg,#7BC67E 0%,#4CAF50 50%,#F5B800 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

/* BUTTONS */
.btn-primary{background:linear-gradient(135deg,var(--green-dark),var(--green));color:#fff;padding:13px 28px;border-radius:50px;text-decoration:none;font-weight:600;font-size:14px;border:none;cursor:pointer;transition:all 0.3s;display:inline-flex;align-items:center;gap:8px;}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(76,175,80,0.4);}
.btn-outline{background:transparent;color:var(--text);padding:13px 28px;border-radius:50px;text-decoration:none;font-weight:600;font-size:14px;border:2px solid rgba(76,175,80,0.4);cursor:pointer;transition:all 0.3s;display:inline-flex;align-items:center;gap:8px;}
.btn-outline:hover{border-color:var(--green);background:rgba(76,175,80,0.1);transform:translateY(-2px);}

/* HERO */
.hero{min-height:100vh;background:linear-gradient(135deg,#0A150A 0%,#0d1f0d 50%,#0a1a15 100%);position:relative;display:flex;align-items:center;overflow:hidden;}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 70% 50%,rgba(76,175,80,0.08),transparent 60%);pointer-events:none;}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(76,175,80,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(76,175,80,0.04) 1px,transparent 1px);background-size:60px 60px;}
.hero-content{position:relative;z-index:2;max-width:1200px;margin:0 auto;padding:120px 40px 80px;display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center;}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(76,175,80,0.15);border:1px solid rgba(76,175,80,0.3);border-radius:50px;padding:8px 20px;font-size:13px;color:var(--green-light);margin-bottom:24px;}
.hero-badge .dot{width:6px;height:6px;background:#4caf50;border-radius:50%;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.5;transform:scale(1.5);}}
.hero-title{font-family:'Syne',sans-serif;font-size:clamp(38px,5vw,64px);font-weight:800;line-height:1.1;margin-bottom:20px;}
.hero-tagline{font-size:17px;color:var(--text-muted);line-height:1.7;margin-bottom:36px;max-width:480px;}
.hero-stats{display:flex;gap:28px;margin-bottom:40px;flex-wrap:wrap;}
.stat-num{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;background:linear-gradient(135deg,var(--gold),var(--green-light));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.stat-label{font-size:11px;color:var(--text-muted);margin-top:2px;}
.hero-btns{display:flex;gap:16px;flex-wrap:wrap;}
.hero-img-wrap{border-radius:20px;overflow:hidden;border:1px solid var(--border);position:relative;}
.hero-img-wrap img{width:100%;height:400px;object-fit:cover;object-position:top;display:block;}
.hero-chips{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;}
.chip{background:rgba(10,20,10,0.9);border:1px solid var(--border);border-radius:50px;padding:7px 14px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px;}
.chip .dot{width:7px;height:7px;border-radius:50%;}

/* OFFER BANNER */
.offer-banner{background:linear-gradient(135deg,#071a07,#0a1f0a);border-top:1px solid rgba(76,175,80,0.2);border-bottom:1px solid rgba(76,175,80,0.2);padding:56px 40px;text-align:center;position:relative;overflow:hidden;}
.offer-banner::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(76,175,80,0.05),transparent 70%);}
.offer-tag{display:inline-flex;align-items:center;gap:8px;background:rgba(76,175,80,0.15);border:1px solid rgba(76,175,80,0.3);border-radius:50px;padding:6px 18px;font-size:12px;color:var(--green-light);margin-bottom:16px;font-weight:600;text-transform:uppercase;letter-spacing:1px;}
.offer-title{font-family:'Syne',sans-serif;font-size:clamp(24px,4vw,44px);font-weight:800;color:#fff;margin-bottom:12px;}
.offer-sub{font-size:16px;color:var(--text-muted);margin-bottom:36px;}
.offer-cards{display:flex;gap:20px;justify-content:center;flex-wrap:wrap;max-width:800px;margin:0 auto 36px;}
.offer-card{background:rgba(76,175,80,0.06);border:1px solid rgba(76,175,80,0.25);border-radius:16px;padding:22px 28px;flex:1;min-width:180px;text-align:center;transition:all 0.3s;}
.offer-card:hover{transform:translateY(-4px);border-color:var(--green);}
.offer-pct{font-family:'Syne',sans-serif;font-size:40px;font-weight:800;color:var(--green-light);}
.offer-desc{font-size:13px;color:var(--text-muted);margin-top:4px;}
.offer-label{font-size:14px;font-weight:600;color:var(--text);margin-top:6px;}

/* PHOTO WITH WATERMARK */
.photo-wrap{position:relative;overflow:hidden;border-radius:inherit;}
.photo-wrap img{width:100%;height:100%;object-fit:cover;display:block;}
.photo-watermark{position:absolute;top:10px;left:10px;display:flex;align-items:center;gap:4px;background:rgba(255,255,255,0.18);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,0.3);border-radius:50%;padding:5px;pointer-events:none;width:48px;height:48px;overflow:hidden;}
.photo-watermark img{height:18px;object-fit:contain;mix-blend-mode:screen;filter:brightness(1.3);}
.photo-watermark span{font-size:10px;color:var(--green-light);font-weight:700;letter-spacing:0.5px;}

/* ABOUT / COACHES merged grid */
.ac-section{background:var(--dark);padding:100px 0;}
.ac-grid{display:grid;grid-template-columns:1fr;gap:0;}
.ac-item{display:grid;grid-template-columns:1fr 1fr;gap:0;align-items:stretch;border:1px solid var(--border);border-radius:24px;overflow:hidden;background:var(--surface);margin-bottom:40px;transition:all 0.3s;}
.ac-item:hover{border-color:rgba(76,175,80,0.4);box-shadow:0 20px 40px rgba(0,0,0,0.3);}
.ac-item.reverse{direction:rtl;}
.ac-item.reverse > *{direction:ltr;}
.ac-img{overflow:hidden;min-height:400px;}
.ac-img img{width:100%;height:100%;object-fit:cover;object-position:top center;display:block;transition:transform 0.5s;}
.ac-item:hover .ac-img img{transform:scale(1.04);}
.ac-info{padding:40px;display:flex;flex-direction:column;justify-content:center;}
.ac-role{font-size:11px;color:var(--green-light);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
.ac-name{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;margin-bottom:10px;}
.ac-exp{display:inline-flex;align-items:center;gap:6px;background:rgba(245,184,0,0.1);border:1px solid rgba(245,184,0,0.25);border-radius:50px;padding:4px 14px;font-size:12px;color:var(--gold);font-weight:600;margin-bottom:16px;}
.ac-bio{font-size:14px;color:var(--text-muted);line-height:1.8;margin-bottom:20px;}
.ac-stats{display:flex;gap:20px;flex-wrap:wrap;padding-top:16px;border-top:1px solid var(--border);}
.ac-stat .num{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--green-light);}
.ac-stat .lbl{font-size:11px;color:var(--text-muted);}
.ac-tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;}
.ac-tag{background:rgba(76,175,80,0.1);border:1px solid rgba(76,175,80,0.2);border-radius:50px;padding:4px 12px;font-size:12px;color:var(--green-light);}
.couple-band{background:var(--surface);border:1px solid var(--border);border-radius:24px;overflow:hidden;display:grid;grid-template-columns:440px 1fr;margin-top:0;}
.couple-band-img{overflow:hidden;height:360px;display:flex;}
.couple-band-img img{width:100%;height:100%;object-fit:cover;object-position:top;display:block;}
.couple-band-text{padding:48px;display:flex;flex-direction:column;justify-content:center;}
.couple-band-text h3{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;margin-bottom:12px;}
.couple-band-text p{font-size:14px;color:var(--text-muted);line-height:1.8;}

/* SERVICES */
.services-section{background:var(--dark2);}
.services-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:60px;}
.service-card{background:rgba(76,175,80,0.04);border:1px solid var(--border);border-radius:20px;overflow:hidden;transition:all 0.4s;display:flex;flex-direction:column;}
.service-card:hover{transform:translateY(-5px);border-color:rgba(76,175,80,0.4);box-shadow:0 16px 36px rgba(0,0,0,0.3);}
.service-img{width:100%;height:160px;overflow:hidden;position:relative;}
.service-img img{width:100%;height:100%;object-fit:cover;transition:transform 0.5s;}
.service-card:hover .service-img img{transform:scale(1.08);}
.service-body{padding:22px;flex:1;display:flex;flex-direction:column;}
.service-num{font-size:10px;color:rgba(76,175,80,0.4);font-weight:800;letter-spacing:2px;margin-bottom:6px;}
.service-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:8px;}
.service-desc{font-size:13px;color:var(--text-muted);line-height:1.7;flex:1;margin-bottom:14px;}
.service-cta{display:inline-flex;align-items:center;gap:6px;color:var(--green-light);font-size:12px;font-weight:600;cursor:pointer;background:none;border:none;padding:0;font-family:inherit;transition:all 0.2s;}
.service-cta:hover{gap:10px;color:var(--green);}

/* PRODUCTS */
.products-tabs{display:flex;gap:8px;margin-bottom:40px;background:var(--surface);border-radius:12px;padding:5px;width:fit-content;}
.tab-btn{padding:10px 24px;border-radius:9px;border:none;background:transparent;color:var(--text-muted);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.3s;}
.tab-btn.active{background:linear-gradient(135deg,var(--green-dark),var(--green));color:#fff;}
.flavors-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;}
.flavor-chip{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px 16px;font-size:13px;font-weight:500;transition:all 0.3s;display:flex;align-items:center;gap:10px;}
.flavor-chip:hover{border-color:var(--green);background:rgba(76,175,80,0.08);transform:translateY(-2px);}
.flavor-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}

/* MEMBERSHIP */
.plans-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-top:60px;}
.plan-card{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:32px;position:relative;overflow:hidden;transition:all 0.4s;display:flex;flex-direction:column;}
.plan-card.featured{background:linear-gradient(135deg,rgba(76,175,80,0.1),rgba(0,200,83,0.04));border-color:var(--green);transform:scale(1.03);}
.plan-card.featured::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--green-dark),var(--green-light));}
.plan-badge{display:inline-flex;background:rgba(76,175,80,0.15);border:1px solid rgba(76,175,80,0.3);border-radius:50px;padding:4px 14px;font-size:11px;color:var(--green-light);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:18px;width:fit-content;}
.plan-badge.gold{background:rgba(245,184,0,0.12);border-color:rgba(245,184,0,0.3);color:var(--gold);}
.plan-name{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;margin-bottom:6px;}
.plan-desc{font-size:13px;color:var(--text-muted);margin-bottom:20px;}
.plan-features{list-style:none;margin-bottom:24px;flex:1;}
.plan-features li{display:flex;align-items:flex-start;gap:10px;font-size:13px;color:var(--text-muted);padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
.plan-features li:last-child{border:none;}
.plan-features li .material-icons{font-size:15px;color:var(--green-light);margin-top:2px;flex-shrink:0;}
.plan-cta{width:100%;padding:13px;border-radius:50px;border:none;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.3s;margin-top:auto;}
.plan-cta-primary{background:linear-gradient(135deg,var(--green-dark),var(--green));color:#fff;}
.plan-cta-primary:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(76,175,80,0.4);}
.plan-cta-outline{background:transparent;color:var(--green-light);border:2px solid rgba(76,175,80,0.35);}
.plan-cta-outline:hover{background:rgba(76,175,80,0.1);}

/* TRANSFORMATION PAGE */
.transform-section{background:var(--dark);}
.transform-intro{text-align:center;max-width:700px;margin:0 auto 60px;}
.transform-item{display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:start;margin-bottom:60px;padding-bottom:60px;border-bottom:1px solid rgba(76,175,80,0.1);}
.transform-item:last-child{border-bottom:none;margin-bottom:0;}
.transform-item.reverse{}
.transform-item.reverse .transform-img{order:2;}
.transform-item.reverse .transform-text{order:1;}
.transform-img{border-radius:20px;overflow:hidden;border:1px solid var(--border);}
.transform-img img{width:100%;display:block;}
.transform-text{padding:8px 0;}
.transform-name{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;margin-bottom:6px;}
.transform-tag{font-size:12px;color:var(--green-light);font-weight:600;margin-bottom:20px;display:block;}
.transform-phase{margin-bottom:20px;}
.phase-title{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--green-light);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.phase-title::before{content:'';width:16px;height:2px;background:var(--green);flex-shrink:0;}
.phase-body{font-size:14px;color:var(--text-muted);line-height:1.8;}
.phase-body li{margin-left:20px;margin-bottom:4px;}
.transform-results{display:flex;gap:16px;flex-wrap:wrap;margin-top:20px;padding-top:20px;border-top:1px solid var(--border);}
.result-pill{background:rgba(76,175,80,0.08);border:1px solid rgba(76,175,80,0.2);border-radius:50px;padding:8px 18px;}
.result-pill .num{font-family:'Syne',sans-serif;font-size:18px;font-weight:800;color:var(--gold);}
.result-pill .lbl{font-size:11px;color:var(--text-muted);}

/* REVIEWS */
.reviews-section{background:var(--dark2);}
.reviews-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:48px;}
.review-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:22px;transition:all 0.3s;display:flex;flex-direction:column;}
.review-card:hover{border-color:rgba(76,175,80,0.3);transform:translateY(-3px);}
.review-card.featured{border-color:rgba(76,175,80,0.35);background:linear-gradient(135deg,rgba(76,175,80,0.06),rgba(0,200,83,0.02));position:relative;}
.review-card.featured::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--green),var(--gold));border-radius:18px 18px 0 0;}
.review-quote{font-size:28px;color:rgba(76,175,80,0.2);margin-bottom:10px;font-family:Georgia,serif;line-height:1;}
.review-stars{color:var(--gold);font-size:14px;margin-bottom:10px;letter-spacing:2px;}
.review-text{font-size:13px;color:var(--text-muted);line-height:1.75;flex:1;margin-bottom:16px;}
.review-author{display:flex;align-items:center;gap:10px;padding-top:14px;border-top:1px solid rgba(76,175,80,0.08);}
.review-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--green-dark),var(--green));display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:13px;font-weight:800;color:#fff;flex-shrink:0;}
.review-name{font-weight:700;font-size:14px;}
.review-result{font-size:11px;color:var(--green-light);margin-top:1px;}

/* CTA */
.cta-section{background:var(--dark);padding:80px 0;}
.cta-box{background:linear-gradient(135deg,rgba(76,175,80,0.1),rgba(0,200,83,0.04));border:1px solid rgba(76,175,80,0.25);border-radius:28px;padding:60px;text-align:center;position:relative;overflow:hidden;}
.cta-box::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--green),var(--gold),var(--green));}
.cta-title{font-family:'Syne',sans-serif;font-size:clamp(26px,4vw,44px);font-weight:800;margin-bottom:14px;}
.cta-text{font-size:16px;color:var(--text-muted);max-width:500px;margin:0 auto 32px;line-height:1.7;}
.cta-btns{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-bottom:28px;}
.contact-chips{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.contact-chip{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:50px;padding:8px 18px;font-size:13px;color:var(--text-muted);transition:all 0.3s;text-decoration:none;}
.contact-chip:hover{border-color:var(--green);color:var(--text);}
.contact-chip .material-icons{font-size:16px;color:var(--green-light);}

/* CONTACT */
.contact-page{padding:120px 0 80px;min-height:100vh;background:var(--dark);}
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:start;margin-top:48px;}
.contact-info-card{background:rgba(76,175,80,0.04);border:1px solid var(--border);border-radius:24px;padding:36px;}
.contact-info-card h3{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;margin-bottom:20px;color:var(--green-light);}
.contact-item{display:flex;align-items:flex-start;gap:14px;margin-bottom:20px;padding:16px;background:rgba(76,175,80,0.04);border:1px solid var(--border);border-radius:14px;text-decoration:none;color:var(--text);transition:all 0.3s;}
.contact-item:hover{border-color:rgba(76,175,80,0.3);transform:translateX(4px);}
.contact-item-icon{width:40px;height:40px;border-radius:10px;background:rgba(76,175,80,0.12);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.contact-item-icon .material-icons{font-size:20px;color:var(--green-light);}
.ci-label{font-size:11px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px;}
.ci-value{font-size:14px;color:var(--text);font-weight:500;}
.call-wa-btns{display:flex;gap:12px;margin-top:24px;flex-wrap:wrap;}
.btn-call{background:linear-gradient(135deg,#1565c0,#1976D2);color:#fff;padding:12px 20px;border-radius:50px;text-decoration:none;font-weight:600;font-size:13px;border:none;cursor:pointer;transition:all 0.3s;display:inline-flex;align-items:center;gap:8px;}
.btn-call:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(25,118,210,0.4);}
.btn-wa{background:linear-gradient(135deg,#1b5e20,#25D366);color:#fff;padding:12px 20px;border-radius:50px;text-decoration:none;font-weight:600;font-size:13px;border:none;cursor:pointer;transition:all 0.3s;display:inline-flex;align-items:center;gap:8px;}
.btn-wa:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(37,211,102,0.4);}
.contact-form-card{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:36px;}
.contact-form-card h3{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;margin-bottom:6px;}
.contact-form-card p{font-size:14px;color:var(--text-muted);margin-bottom:24px;}
.form-group{margin-bottom:16px;}
.form-group label{font-size:12px;color:var(--text-muted);font-weight:600;display:block;margin-bottom:7px;text-transform:uppercase;letter-spacing:0.5px;}
.form-group input,.form-group select,.form-group textarea{width:100%;background:var(--dark3);border:1px solid var(--border);border-radius:10px;padding:13px 15px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;transition:border-color 0.3s;outline:none;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--green);}
.form-group textarea{height:100px;resize:vertical;}
.form-group select option{background:var(--dark);}
.form-submit{width:100%;padding:14px;border-radius:50px;border:none;background:linear-gradient(135deg,#1b5e20,#25D366);color:#fff;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.3s;display:flex;align-items:center;justify-content:center;gap:10px;}
.form-submit:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(37,211,102,0.4);}

/* FOOTER */
footer{background:var(--dark2);border-top:1px solid var(--border);padding:56px 0 28px;}
.footer-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:40px;margin-bottom:44px;}
.footer-brand-logo{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.footer-brand-logo img{height:44px;object-fit:contain;mix-blend-mode:screen;filter:brightness(1.2);}
.footer-logo-text{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--green-light);line-height:1;}
.footer-tagline-text{font-size:11px;color:var(--text-muted);letter-spacing:0.5px;}
.footer-desc{font-size:13px;color:var(--text-muted);line-height:1.7;max-width:260px;margin-bottom:18px;}
.social-links{display:flex;gap:10px;}
.social-link{width:36px;height:36px;border-radius:8px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--text-muted);transition:all 0.3s;text-decoration:none;font-size:12px;font-weight:700;}
.social-link:hover{background:rgba(76,175,80,0.15);border-color:var(--green);color:var(--green-light);}
.footer-col h4{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text);margin-bottom:16px;}
.footer-col ul{list-style:none;}
.footer-col ul li{margin-bottom:10px;}
.footer-col ul li a{color:var(--text-muted);text-decoration:none;font-size:13px;transition:color 0.2s;cursor:pointer;}
.footer-col ul li a:hover{color:var(--green-light);}
.footer-address{font-size:13px;color:var(--text-muted);line-height:1.8;}
.footer-bottom{border-top:1px solid var(--border);padding-top:22px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
.footer-bottom p{font-size:12px;color:var(--text-muted);}

/* FLOATING BTNS */
.float-btns{position:fixed;bottom:24px;right:24px;z-index:999;display:flex;flex-direction:column;align-items:center;gap:12px;}
.float-btn{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;text-decoration:none;transition:all 0.3s;box-shadow:0 4px 16px rgba(0,0,0,0.3);}
.float-btn:hover{transform:scale(1.1);}
.float-wa{background:linear-gradient(135deg,#128C7E,#25D366);}
.float-call{background:linear-gradient(135deg,#1565c0,#1976D2);}
.float-btn .material-icons{font-size:24px;color:#fff;}

/* REVEAL */
.reveal{opacity:0;transform:translateY(28px);transition:all 0.7s cubic-bezier(0.16,1,0.3,1);}
.reveal.visible{opacity:1;transform:none;}
.reveal-delay-1{transition-delay:0.12s;}
.reveal-delay-2{transition-delay:0.24s;}
.reveal-delay-3{transition-delay:0.36s;}

/* RESPONSIVE */
@media(max-width:1024px){
  .footer-grid{grid-template-columns:1fr 1fr;}
  .plans-grid{grid-template-columns:1fr;}
  .plan-card.featured{transform:none;}
  .services-grid{grid-template-columns:1fr 1fr;}
}
@media(max-width:900px){
  nav{padding:10px 20px;}
  .nav-links{display:none;}
  .hamburger{display:flex;}
  .hero-content{grid-template-columns:1fr;padding:100px 20px 60px;gap:32px;}
  .hero-img-wrap{display:none;}
  .ac-item,.ac-item.reverse{grid-template-columns:1fr;}
  .ac-item.reverse .transform-img{order:0;}
  .ac-img{min-height:280px;}
  .couple-band{grid-template-columns:1fr;}
  .couple-band-img{height:280px;}
  .transform-item,.transform-item.reverse{grid-template-columns:1fr;}
  .transform-item.reverse .transform-img{order:0;}
  .transform-item.reverse .transform-text{order:1;}
  .contact-grid{grid-template-columns:1fr;}
  section{padding:64px 0;}
  .container{padding:0 20px;}
  .cta-box{padding:36px 20px;}
  .offer-banner{padding:40px 20px;}
}
@media(max-width:600px){
  .services-grid{grid-template-columns:1fr;}
  .reviews-grid{grid-template-columns:1fr;}
  .footer-grid{grid-template-columns:1fr;}
  .footer-bottom{flex-direction:column;text-align:center;}
  .hero-btns{flex-direction:column;}
  .cta-btns{flex-direction:column;align-items:center;}
  .call-wa-btns{flex-direction:column;}
  .offer-cards{flex-direction:column;}
  .hero-stats{gap:16px;}
}

.photo-watermark span{display:none!important;}.photo-watermark img{width:38px!important;height:38px!important;object-fit:contain!important;}
/* Hero Slideshow */
.hero-slideshow {
  width: 100%;
  height: 520px;
  border-radius: 24px;
  position: relative;
  overflow: hidden;
  box-shadow: 0 32px 80px rgba(0,0,0,0.4);
}
.hero-slideshow .slide {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center top;
  opacity: 0;
  transition: opacity 0.8s ease-in-out;
}
.hero-slideshow .slide.active {
  opacity: 1;
}
.slide-dots {
  position: absolute;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 8px;
  z-index: 10;
}
.dot-indicator {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: rgba(255,255,255,0.5);
  cursor: pointer;
  transition: background 0.3s;
}
.dot-indicator.active {
  background: #fff;
  width: 24px;
  border-radius: 5px;
}
/* Nav logo sizing */
.nav-logo img { height: 48px !important; width: auto !important; }
/* Watermark small */
.photo-watermark { 
  position: absolute; 
  top: 12px !important; 
  left: 12px !important; 
  bottom: auto !important; 
  right: auto !important; 
  width: 56px !important; 
  height: 56px !important;
  background: rgba(255,255,255,0.15) !important;
  backdrop-filter: blur(4px);
  border-radius: 50% !important;
  padding: 6px !important;
}

<body>
<div id="nav-container"></div>
<div id="main-content">
  <div id="page-home-container"></div>
  <div id="page-about-container"></div>
  <div id="page-services-container"></div>
  <div id="page-products-container"></div>
  <div id="page-membership-container"></div>
  <div id="page-transformation-container"></div>
  <div id="page-reviews-container"></div>
  <div id="page-contact-container"></div>
</div>
<script src="js/main.js"></script>
<script src="js/slideshow.js"></script>
<script>
async function loadComponents() {
  const nav = await fetch('components/navbar.html');
  document.getElementById('nav-container').innerHTML = await nav.text();
  const names = ['home', 'about', 'services', 'products', 'membership', 'transformation', 'reviews', 'contact'];
  for (const n of names) {
    const r = await fetch('pages/page-' + n + '.html');
    document.getElementById('page-' + n + '-container').innerHTML = await r.text();
  }
}
document.addEventListener('DOMContentLoaded', loadComponents);
</script>
